spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  mongodb:
    uri: ${MONGO_URI}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USER}
      password: ${REDIS_PASS}

app:
  cors:
    allowed-origins: ${RESEND_URL}

  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}

resend:
  api-key: ${RESEND_API_KEY}
  from-email: ${RESEND_FROM_EMAIL}
  base-url: ${RESEND_URL}

jwt:
  secret: ${JWT_SECRET}
  access-exp-minutes: 60
  refresh-exp-days: 14

